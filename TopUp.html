<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RobuxTop Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --robux-gold: #FFB800;
            --roblox-blue: #00A2FF;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .page-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .dark .glass-effect {
            background: rgba(30, 41, 59, 0.8);
        }

        .bottom-nav {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 184, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 184, 0, 0); }
        }

        .success-animation {
            animation: bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 z-[100] bg-white dark:bg-slate-900 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-xl animate-bounce">
                <i class="fas fa-cube text-white text-5xl"></i>
            </div>
            <div class="absolute -bottom-12 left-1/2 -translate-x-1/2 flex space-x-1">
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
            </div>
        </div>
        <h1 class="mt-16 text-2xl font-bold tracking-tight text-slate-800 dark:text-white">RobuxTop Hub</h1>
    </div>

    <!-- App Container -->
    <div id="app" class="hidden min-h-screen flex flex-col pb-24">
        
        <!-- Header -->
        <header id="main-header" class="sticky top-0 z-40 glass-effect border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-cube text-white text-xs"></i>
                </div>
                <span class="font-bold text-lg">RobuxTop</span>
            </div>
            <div class="flex items-center space-x-3">
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>
                <div id="header-balance" class="bg-amber-100 dark:bg-amber-900/30 px-3 py-1 rounded-full flex items-center space-x-1 border border-amber-200 dark:border-amber-800">
                    <span class="text-amber-600 font-bold text-sm" id="user-robux">0</span>
                    <i class="fas fa-hexagon-nodes text-amber-500 text-xs"></i>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="view-container" class="flex-grow px-4 pt-4 overflow-x-hidden">
            <!-- View content will be injected here -->
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass-effect border-t border-slate-200 dark:border-slate-800 px-2 py-2 flex justify-around items-center z-50">
            <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center p-2 text-blue-600" data-view="home">
                <i class="fas fa-house text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </button>
            <button onclick="router.navigate('shop')" class="nav-item flex flex-col items-center p-2 text-slate-400" data-view="shop">
                <i class="fas fa-cart-shopping text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Top Up</span>
            </button>
            <button onclick="router.navigate('history')" class="nav-item flex flex-col items-center p-2 text-slate-400" data-view="history">
                <i class="fas fa-clock-rotate-left text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">History</span>
            </button>
            <button onclick="router.navigate('profile')" class="nav-item flex flex-col items-center p-2 text-slate-400" data-view="profile">
                <i class="fas fa-user text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Modals & Notifications -->
    <div id="notification-container" class="fixed top-4 left-4 right-4 z-[110] space-y-2 pointer-events-none"></div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div id="modal-content" class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-6 shadow-2xl transition-transform duration-300 scale-90 opacity-0">
            <!-- Modal content injected here -->
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            user: JSON.parse(localStorage.getItem('robux_user')) || null,
            theme: localStorage.getItem('robux_theme') || 'light',
            robux: parseInt(localStorage.getItem('robux_balance')) || 120,
            transactions: JSON.parse(localStorage.getItem('robux_tx')) || [
                { id: 'TX9921', amount: 800, date: '2023-10-24', status: 'Completed', price: '$9.99' },
                { id: 'TX8812', amount: 400, date: '2023-09-15', status: 'Completed', price: '$4.99' }
            ],
            currentView: 'auth',
            searchQuery: '',
            packages: [
                { id: 1, amount: 400, price: 4.99, popular: false, bonus: 0 },
                { id: 2, amount: 800, price: 9.99, popular: true, bonus: 40 },
                { id: 3, amount: 1700, price: 19.99, popular: false, bonus: 100 },
                { id: 4, amount: 4500, price: 49.99, popular: false, bonus: 500 },
                { id: 5, amount: 10000, price: 99.99, popular: true, bonus: 1200 },
                { id: 6, amount: 22500, price: 199.99, popular: false, bonus: 3000 }
            ]
        };

        // --- Router ---
        const router = {
            navigate: (view) => {
                if (!state.user && view !== 'auth') {
                    state.currentView = 'auth';
                } else {
                    state.currentView = view;
                }
                render();
                updateNav();
                window.scrollTo(0, 0);
            }
        };

        // --- Utilities ---
        const notify = (message, type = 'success') => {
            const container = document.getElementById('notification-container');
            const el = document.createElement('div');
            el.className = `p-4 rounded-2xl shadow-lg border-l-4 flex items-center space-x-3 transition-all duration-300 transform translate-y-[-20px] opacity-0 pointer-events-auto ${
                type === 'success' ? 'bg-green-50 border-green-500 text-green-800' : 'bg-red-50 border-red-500 text-red-800'
            }`;
            el.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span class="text-sm font-medium">${message}</span>
            `;
            container.appendChild(el);
            setTimeout(() => {
                el.classList.remove('translate-y-[-20px]', 'opacity-0');
            }, 10);
            setTimeout(() => {
                el.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        };

        const showModal = (html) => {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.innerHTML = html;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
            }, 10);
        };

        const closeModal = () => {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-90', 'opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        };

        const getAvatar = (seed) => {
            return `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed || 'Guest'}`;
        };

        // --- Views ---
        const views = {
            auth: () => `
                <div class="flex flex-col items-center justify-center min-h-[80vh] px-2">
                    <div class="w-full max-w-sm">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white">Welcome Back</h2>
                            <p class="text-slate-500 dark:text-slate-400 mt-2">Sign in to your Roblox account link</p>
                        </div>
                        
                        <div class="space-y-4 bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1 ml-1">Roblox Username</label>
                                <input type="text" id="auth-username" placeholder="e.g. Builderman" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1 ml-1">Password</label>
                                <input type="password" id="auth-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <button onclick="actions.login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                                Login to Hub
                            </button>
                            <div class="flex justify-between items-center px-1">
                                <button onclick="actions.forgotPassword()" class="text-xs font-semibold text-blue-500">Forgot Password?</button>
                                <button onclick="actions.signup()" class="text-xs font-semibold text-slate-500">Create Account</button>
                            </div>
                        </div>

                        <div class="mt-8 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border border-blue-100 dark:border-blue-800 flex items-center space-x-3">
                            <i class="fas fa-shield-halved text-blue-600"></i>
                            <p class="text-[11px] text-blue-800 dark:text-blue-300">Your connection is secured with 256-bit encryption. We never share your credentials.</p>
                        </div>
                    </div>
                </div>
            `,

            home: () => `
                <div class="animate-fade-in space-y-6">
                    <!-- User Welcome Card -->
                    <div class="relative overflow-hidden bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 text-white shadow-xl">
                        <div class="relative z-10">
                            <p class="text-blue-100 text-sm font-medium">Hello,</p>
                            <h2 class="text-2xl font-bold">${state.user.username}</h2>
                            <div class="mt-4 flex items-center space-x-4">
                                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-3 flex-grow border border-white/20">
                                    <p class="text-[10px] uppercase font-bold text-blue-100 tracking-wider">Current Balance</p>
                                    <div class="flex items-center space-x-2">
                                        <span class="text-2xl font-black">${state.robux.toLocaleString()}</span>
                                        <i class="fas fa-hexagon-nodes text-amber-400 text-xl"></i>
                                    </div>
                                </div>
                                <button onclick="router.navigate('shop')" class="bg-white text-blue-600 p-4 rounded-2xl shadow-lg active:scale-90 transition-transform">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                        <i class="fas fa-cube absolute -right-4 -bottom-4 text-white/10 text-9xl rotate-12"></i>
                    </div>

                    <!-- Price Calculator -->
                    <div class="bg-white dark:bg-slate-900 rounded-3xl p-5 border border-slate-100 dark:border-slate-800 shadow-sm">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold">Robux Calculator</h3>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Live Rates</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="relative flex-grow">
                                <input type="number" id="calc-input" value="1000" oninput="actions.calculatePrice(this.value)" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl py-3 pl-10 font-bold focus:ring-2 focus:ring-blue-500">
                                <i class="fas fa-hexagon-nodes absolute left-3 top-1/2 -translate-y-1/2 text-amber-500"></i>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-slate-400 font-bold uppercase">Price</p>
                                <p id="calc-result" class="text-xl font-black text-blue-600">$12.50</p>
                            </div>
                        </div>
                    </div>

                    <!-- Recommended -->
                    <div>
                        <div class="flex items-center justify-between px-2 mb-3">
                            <h3 class="font-bold">Popular Packages</h3>
                            <button onclick="router.navigate('shop')" class="text-blue-500 text-xs font-bold uppercase">See All</button>
                        </div>
                        <div class="flex space-x-4 overflow-x-auto hide-scrollbar pb-4 px-1">
                            ${state.packages.filter(p => p.popular).map(p => `
                                <div onclick="actions.buyPackage(${p.id})" class="flex-shrink-0 w-40 bg-white dark:bg-slate-900 rounded-2xl p-4 border border-slate-100 dark:border-slate-800 shadow-sm active:scale-95 transition-all">
                                    <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center mb-3">
                                        <i class="fas fa-hexagon-nodes text-amber-600"></i>
                                    </div>
                                    <p class="font-black text-lg">${p.amount}</p>
                                    <p class="text-slate-400 text-xs font-medium mb-2">Robux</p>
                                    <div class="text-blue-600 font-bold">$${p.price}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `,

            shop: () => `
                <div class="space-y-6">
                    <div class="flex flex-col space-y-4">
                        <h2 class="text-2xl font-black px-2">Choose Package</h2>
                        <div class="relative px-2">
                            <input type="text" id="shop-search" placeholder="Search amounts..." oninput="actions.filterShop(this.value)" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl py-4 pl-12 pr-4 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        </div>
                    </div>

                    <div id="shop-grid" class="grid grid-cols-2 gap-4 px-2 pb-6">
                        ${state.packages.map(p => `
                            <div onclick="actions.buyPackage(${p.id})" class="relative bg-white dark:bg-slate-900 rounded-3xl p-5 border ${p.popular ? 'border-amber-400' : 'border-slate-100 dark:border-slate-800'} shadow-sm overflow-hidden active:scale-95 transition-all group">
                                ${p.popular ? '<div class="absolute top-0 right-0 bg-amber-400 text-white text-[8px] font-black px-2 py-1 rounded-bl-lg uppercase">Hot</div>' : ''}
                                <div class="flex flex-col items-center text-center">
                                    <div class="w-12 h-12 bg-amber-50 dark:bg-amber-900/20 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                        <i class="fas fa-hexagon-nodes text-amber-500 text-xl"></i>
                                    </div>
                                    <p class="text-xl font-black">${p.amount.toLocaleString()}</p>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-4">Robux</p>
                                    ${p.bonus > 0 ? `<p class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded-full mb-2 font-bold">+${p.bonus} Bonus</p>` : ''}
                                    <button class="w-full bg-slate-900 dark:bg-blue-600 text-white py-2 rounded-xl text-sm font-bold shadow-md">$${p.price}</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,

            history: () => `
                <div class="space-y-6">
                    <div class="flex items-center justify-between px-2">
                        <h2 class="text-2xl font-black">History</h2>
                        <span class="text-xs bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full font-bold text-slate-500">${state.transactions.length} items</span>
                    </div>

                    <div class="relative px-2">
                        <input type="text" id="history-search" placeholder="Search by ID or amount..." oninput="actions.filterHistory(this.value)" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl py-3 pl-10 pr-4 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <i class="fas fa-filter absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>

                    <div id="history-list" class="space-y-3 px-2 pb-6">
                        ${state.transactions.map(tx => `
                            <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 flex items-center justify-between shadow-sm">
                                <div class="flex items-center space-x-4">
                                    <div class="w-10 h-10 bg-green-50 dark:bg-green-900/20 rounded-xl flex items-center justify-center">
                                        <i class="fas fa-arrow-down text-green-500"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-sm">+${tx.amount.toLocaleString()} Robux</p>
                                        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">${tx.id} • ${tx.date}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-sm text-slate-800 dark:text-slate-100">${tx.price}</p>
                                    <span class="text-[8px] font-black uppercase text-green-500">${tx.status}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `,

            profile: () => `
                <div class="space-y-6 pb-6 animate-fade-in">
                    <!-- Profile Header -->
                    <div class="flex flex-col items-center pt-4">
                        <div class="relative">
                            <div class="w-28 h-28 bg-white dark:bg-slate-800 rounded-full border-4 border-white dark:border-slate-900 shadow-xl overflow-hidden">
                                <img id="profile-avatar" src="${getAvatar(state.user.username)}" class="w-full h-full object-cover">
                            </div>
                            <button onclick="actions.editProfile()" class="absolute bottom-0 right-0 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center border-2 border-white dark:border-slate-900 shadow-lg">
                                <i class="fas fa-pen text-[10px]"></i>
                            </button>
                        </div>
                        <h2 class="mt-4 text-2xl font-black">${state.user.username}</h2>
                        <p class="text-slate-500 text-sm font-medium">Joined Oct 2023 • ID: 8829-21</p>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-3 gap-3 px-2">
                        <div class="bg-white dark:bg-slate-900 p-3 rounded-2xl text-center border border-slate-100 dark:border-slate-800">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Total</p>
                            <p class="font-black text-lg">${state.transactions.reduce((acc, curr) => acc + curr.amount, 0)}</p>
                        </div>
                        <div class="bg-white dark:bg-slate-900 p-3 rounded-2xl text-center border border-slate-100 dark:border-slate-800">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Tier</p>
                            <p class="font-black text-lg text-blue-500">Gold</p>
                        </div>
                        <div class="bg-white dark:bg-slate-900 p-3 rounded-2xl text-center border border-slate-100 dark:border-slate-800">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Voucher</p>
                            <p class="font-black text-lg">4</p>
                        </div>
                    </div>

                    <!-- Menu List -->
                    <div class="bg-white dark:bg-slate-900 rounded-3xl overflow-hidden border border-slate-100 dark:border-slate-800 px-2">
                        <div onclick="actions.openSettings()" class="flex items-center justify-between p-4 border-b border-slate-50 dark:border-slate-800 active:bg-slate-50">
                            <div class="flex items-center space-x-4">
                                <div class="w-9 h-9 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center text-slate-500">
                                    <i class="fas fa-gear"></i>
                                </div>
                                <span class="font-bold text-sm">App Settings</span>
                            </div>
                            <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
                        </div>
                        <div onclick="actions.openHelp()" class="flex items-center justify-between p-4 border-b border-slate-50 dark:border-slate-800 active:bg-slate-50">
                            <div class="flex items-center space-x-4">
                                <div class="w-9 h-9 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center text-slate-500">
                                    <i class="fas fa-question-circle"></i>
                                </div>
                                <span class="font-bold text-sm">Help Center</span>
                            </div>
                            <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
                        </div>
                        <div onclick="actions.logout()" class="flex items-center justify-between p-4 active:bg-slate-50">
                            <div class="flex items-center space-x-4">
                                <div class="w-9 h-9 bg-red-50 dark:bg-red-900/20 rounded-xl flex items-center justify-center text-red-500">
                                    <i class="fas fa-right-from-bracket"></i>
                                </div>
                                <span class="font-bold text-sm text-red-500">Logout</span>
                            </div>
                        </div>
                    </div>
                </div>
            `
        };

        // --- Actions Logic ---
        const actions = {
            login: () => {
                const user = document.getElementById('auth-username').value;
                if (!user) return notify('Please enter a username', 'error');
                state.user = { username: user };
                localStorage.setItem('robux_user', JSON.stringify(state.user));
                notify(`Welcome back, ${user}!`);
                router.navigate('home');
            },

            logout: () => {
                state.user = null;
                localStorage.removeItem('robux_user');
                router.navigate('auth');
            },

            signup: () => {
                notify("Signup simulation active. Use any credentials.");
            },

            forgotPassword: () => {
                showModal(`
                    <div class="text-center">
                        <i class="fas fa-key text-4xl text-blue-500 mb-4"></i>
                        <h3 class="text-xl font-black mb-2">Reset Password</h3>
                        <p class="text-slate-500 text-sm mb-6">Enter your email and we'll send you a recovery link.</p>
                        <input type="email" placeholder="email@example.com" class="w-full px-4 py-3 rounded-xl border mb-6 focus:ring-2 focus:ring-blue-500 outline-none">
                        <button onclick="actions.simulateReset()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">Send Link</button>
                    </div>
                `);
            },

            simulateReset: () => {
                closeModal();
                notify("Reset link sent to your email!");
            },

            calculatePrice: (val) => {
                const amount = parseInt(val) || 0;
                const price = (amount * 0.0125).toFixed(2);
                document.getElementById('calc-result').innerText = `$${price}`;
            },

            filterShop: (val) => {
                const query = val.toLowerCase();
                const filtered = state.packages.filter(p => p.amount.toString().includes(query));
                const grid = document.getElementById('shop-grid');
                grid.innerHTML = filtered.map(p => `
                    <div onclick="actions.buyPackage(${p.id})" class="relative bg-white dark:bg-slate-900 rounded-3xl p-5 border ${p.popular ? 'border-amber-400' : 'border-slate-100 dark:border-slate-800'} shadow-sm overflow-hidden active:scale-95 transition-all group">
                        ${p.popular ? '<div class="absolute top-0 right-0 bg-amber-400 text-white text-[8px] font-black px-2 py-1 rounded-bl-lg uppercase">Hot</div>' : ''}
                        <div class="flex flex-col items-center text-center">
                            <div class="w-12 h-12 bg-amber-50 dark:bg-amber-900/20 rounded-full flex items-center justify-center mb-3">
                                <i class="fas fa-hexagon-nodes text-amber-500 text-xl"></i>
                            </div>
                            <p class="text-xl font-black">${p.amount.toLocaleString()}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-4">Robux</p>
                            <button class="w-full bg-slate-900 dark:bg-blue-600 text-white py-2 rounded-xl text-sm font-bold shadow-md">$${p.price}</button>
                        </div>
                    </div>
                `).join('');
            },

            filterHistory: (val) => {
                const query = val.toLowerCase();
                const filtered = state.transactions.filter(tx => 
                    tx.id.toLowerCase().includes(query) || tx.amount.toString().includes(query)
                );
                const list = document.getElementById('history-list');
                list.innerHTML = filtered.map(tx => `
                    <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 flex items-center justify-between shadow-sm">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-green-50 dark:bg-green-900/20 rounded-xl flex items-center justify-center">
                                <i class="fas fa-arrow-down text-green-500"></i>
                            </div>
                            <div>
                                <p class="font-bold text-sm">+${tx.amount.toLocaleString()} Robux</p>
                                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">${tx.id} • ${tx.date}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-sm text-slate-800 dark:text-slate-100">${tx.price}</p>
                            <span class="text-[8px] font-black uppercase text-green-500">${tx.status}</span>
                        </div>
                    </div>
                `).join('');
            },

            buyPackage: (id) => {
                const pkg = state.packages.find(p => p.id === id);
                showModal(`
                    <div class="space-y-6">
                        <div class="text-center">
                            <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-hexagon-nodes text-amber-600 text-2xl"></i>
                            </div>
                            <h3 class="text-2xl font-black">${pkg.amount.toLocaleString()} Robux</h3>
                            <p class="text-slate-400 font-bold uppercase text-xs">Checkout Summary</p>
                        </div>

                        <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-slate-400 text-sm">Package Price</span>
                                <span class="font-bold">$${pkg.price}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-slate-400 text-sm">Service Fee</span>
                                <span class="text-green-500 font-bold">FREE</span>
                            </div>
                            <div class="border-t border-slate-200 dark:border-slate-700 pt-3 flex justify-between items-center">
                                <span class="font-bold">Total Amount</span>
                                <span class="text-xl font-black text-blue-600">$${pkg.price}</span>
                            </div>
                        </div>

                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Payment Method</p>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="actions.selectMethod(this)" class="payment-method-btn border-2 border-blue-500 bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl flex flex-col items-center">
                                    <i class="fab fa-cc-visa text-blue-600 mb-1"></i>
                                    <span class="text-[8px] font-bold uppercase">Card</span>
                                </button>
                                <button onclick="actions.selectMethod(this)" class="payment-method-btn border-2 border-slate-100 dark:border-slate-800 p-3 rounded-xl flex flex-col items-center">
                                    <i class="fab fa-apple-pay text-slate-400 mb-1"></i>
                                    <span class="text-[8px] font-bold uppercase">Apple</span>
                                </button>
                                <button onclick="actions.selectMethod(this)" class="payment-method-btn border-2 border-slate-100 dark:border-slate-800 p-3 rounded-xl flex flex-col items-center">
                                    <i class="fas fa-wallet text-slate-400 mb-1"></i>
                                    <span class="text-[8px] font-bold uppercase">Wallet</span>
                                </button>
                            </div>
                        </div>

                        <button onclick="actions.confirmPurchase(${pkg.id})" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/30 active:scale-95 transition-transform">
                            Confirm Payment
                        </button>
                        <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold text-sm">Cancel Order</button>
                    </div>
                `);
            },

            selectMethod: (el) => {
                document.querySelectorAll('.payment-method-btn').forEach(btn => {
                    btn.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
                    btn.classList.add('border-slate-100', 'dark:border-slate-800');
                    btn.querySelector('i').classList.replace('text-blue-600', 'text-slate-400');
                });
                el.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
                el.classList.remove('border-slate-100', 'dark:border-slate-800');
                el.querySelector('i').classList.replace('text-slate-400', 'text-blue-600');
            },

            confirmPurchase: (id) => {
                const pkg = state.packages.find(p => p.id === id);
                showModal(`
                    <div class="flex flex-col items-center py-8">
                        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mb-6 animate-pulse">
                            <i class="fas fa-sync-alt text-white text-3xl fa-spin"></i>
                        </div>
                        <h3 class="text-xl font-bold">Processing Order...</h3>
                        <p class="text-slate-500 text-sm mt-2">Connecting to secure gateway</p>
                    </div>
                `);

                setTimeout(() => {
                    // Logic update
                    state.robux += pkg.amount + pkg.bonus;
                    const newTx = {
                        id: 'TX' + Math.floor(1000 + Math.random() * 9000),
                        amount: pkg.amount,
                        date: new Date().toISOString().split('T')[0],
                        status: 'Completed',
                        price: '$' + pkg.price
                    };
                    state.transactions.unshift(newTx);
                    
                    // Persist
                    localStorage.setItem('robux_balance', state.robux);
                    localStorage.setItem('robux_tx', JSON.stringify(state.transactions));

                    showModal(`
                        <div class="text-center py-4 success-animation">
                            <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-green-500/40">
                                <i class="fas fa-check text-white text-4xl"></i>
                            </div>
                            <h3 class="text-2xl font-black mb-2">Top-up Success!</h3>
                            <p class="text-slate-500 mb-8 px-4">The ${pkg.amount} Robux has been credited to your account.</p>
                            <button onclick="actions.finalizePurchase()" class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white font-black py-4 rounded-2xl">Awesome!</button>
                        </div>
                    `);
                    notify(`${pkg.amount} Robux Added Successfully!`);
                }, 2000);
            },

            finalizePurchase: () => {
                closeModal();
                router.navigate('home');
            },

            editProfile: () => {
                showModal(`
                    <div class="space-y-6">
                        <div class="text-center">
                            <h3 class="text-xl font-black">Edit Identity</h3>
                            <p class="text-xs text-slate-400 font-bold uppercase">Dynamic Avatar Sync</p>
                        </div>
                        <div class="flex justify-center mb-6">
                            <img id="edit-avatar-preview" src="${getAvatar(state.user.username)}" class="w-24 h-24 rounded-full border-4 border-slate-100 shadow-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-1 ml-1">Update Username</label>
                            <input type="text" id="new-username" value="${state.user.username}" oninput="document.getElementById('edit-avatar-preview').src = 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + this.value" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <button onclick="actions.saveProfile()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">Save Changes</button>
                    </div>
                `);
            },

            saveProfile: () => {
                const newName = document.getElementById('new-username').value;
                if (!newName) return notify('Name cannot be empty', 'error');
                state.user.username = newName;
                localStorage.setItem('robux_user', JSON.stringify(state.user));
                closeModal();
                notify("Profile updated!");
                render();
            },

            openSettings: () => {
                showModal(`
                    <div class="space-y-6">
                        <h3 class="text-xl font-black mb-4">Settings</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-2xl">
                                <span class="font-bold text-sm">Theme Mode</span>
                                <button onclick="actions.toggleTheme()" class="w-12 h-6 bg-blue-600 rounded-full relative">
                                    <div class="absolute w-5 h-5 bg-white rounded-full top-0.5 ${state.theme === 'dark' ? 'right-0.5' : 'left-0.5'} transition-all"></div>
                                </button>
                            </div>
                            <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-2xl">
                                <span class="font-bold text-sm">Language</span>
                                <select class="bg-transparent font-bold text-sm outline-none">
                                    <option>English</option>
                                    <option>Spanish</option>
                                    <option>French</option>
                                </select>
                            </div>
                            <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-2xl opacity-50">
                                <span class="font-bold text-sm">Push Notifications</span>
                                <i class="fas fa-toggle-on text-blue-600 text-xl"></i>
                            </div>
                        </div>
                        <button onclick="closeModal()" class="w-full py-4 font-bold text-slate-500">Close</button>
                    </div>
                `);
            },

            toggleTheme: () => {
                state.theme = state.theme === 'light' ? 'dark' : 'light';
                document.documentElement.className = state.theme;
                localStorage.setItem('robux_theme', state.theme);
                closeModal();
                actions.openSettings(); // Refresh UI in modal
            },

            openHelp: () => {
                showModal(`
                    <div class="space-y-4">
                        <h3 class="text-xl font-black mb-4 text-center">Help Center</h3>
                        <div class="space-y-2">
                            <details class="group bg-slate-50 dark:bg-slate-800 rounded-xl p-3">
                                <summary class="list-none font-bold text-sm flex justify-between items-center cursor-pointer">
                                    How long for delivery?
                                    <i class="fas fa-plus text-[10px] group-open:rotate-45 transition-transform"></i>
                                </summary>
                                <p class="text-xs text-slate-500 mt-2">Usually instant, but can take up to 2 hours during maintenance.</p>
                            </details>
                            <details class="group bg-slate-50 dark:bg-slate-800 rounded-xl p-3">
                                <summary class="list-none font-bold text-sm flex justify-between items-center cursor-pointer">
                                    Is my account safe?
                                    <i class="fas fa-plus text-[10px] group-open:rotate-45 transition-transform"></i>
                                </summary>
                                <p class="text-xs text-slate-500 mt-2">Yes, we use the official Roblox API endpoints for transfers.</p>
                            </details>
                        </div>
                        <div class="mt-4 p-4 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl text-center">
                            <p class="text-sm font-bold mb-2">Need more help?</p>
                            <button onclick="actions.openChat()" class="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-black uppercase">Live Chat</button>
                        </div>
                    </div>
                `);
            },

            openChat: () => {
                showModal(`
                    <div class="h-[400px] flex flex-col">
                        <div class="flex items-center space-x-3 mb-4 pb-4 border-b">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                                <i class="fas fa-headset text-blue-600"></i>
                            </div>
                            <div>
                                <p class="font-bold text-sm">RobuxTop Support</p>
                                <p class="text-[10px] text-green-500 font-bold uppercase">Online Now</p>
                            </div>
                        </div>
                        <div class="flex-grow space-y-4 overflow-y-auto pr-2">
                            <div class="bg-slate-100 dark:bg-slate-800 p-3 rounded-2xl rounded-tl-none mr-12">
                                <p class="text-xs">Hello! How can I assist you with your top-up today?</p>
                            </div>
                            <div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none ml-12">
                                <p class="text-xs">I have a question about my transaction status.</p>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center space-x-2">
                            <input type="text" placeholder="Type message..." class="flex-grow px-4 py-2 bg-slate-50 dark:bg-slate-800 border-none rounded-full text-xs outline-none">
                            <button class="w-10 h-10 bg-blue-600 text-white rounded-full"><i class="fas fa-paper-plane text-xs"></i></button>
                        </div>
                    </div>
                `);
            }
        };

        // --- Core Engine ---
        function render() {
            const container = document.getElementById('view-container');
            const appHeader = document.getElementById('main-header');
            const bottomNav = document.getElementById('bottom-nav');
            const balanceVal = document.getElementById('user-robux');

            // Header/Nav visibility logic
            if (state.currentView === 'auth') {
                appHeader.classList.add('hidden');
                bottomNav.classList.add('hidden');
            } else {
                appHeader.classList.remove('hidden');
                bottomNav.classList.remove('hidden');
                balanceVal.innerText = state.robux.toLocaleString();
            }

            // View rendering
            container.innerHTML = views[state.currentView]();
            
            // Animation trigger
            container.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                container.classList.remove('opacity-0', 'translate-y-4');
                container.classList.add('opacity-100', 'translate-y-0');
            }, 50);
        }

        function updateNav() {
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.dataset.view === state.currentView) {
                    item.classList.add('text-blue-600');
                    item.classList.remove('text-slate-400');
                } else {
                    item.classList.remove('text-blue-600');
                    item.classList.add('text-slate-400');
                }
            });
        }

        // --- Lifecycle ---
        window.onload = () => {
            // Apply initial theme
            document.documentElement.className = state.theme;

            // Simulate splash
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('app').classList.remove('hidden');
                
                // Initial Route
                if (state.user) {
                    router.navigate('home');
                } else {
                    router.navigate('auth');
                }
            }, 2000);
        };

        // Theme Toggle shortcut
        document.getElementById('theme-toggle').onclick = () => {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.documentElement.className = state.theme;
            localStorage.setItem('robux_theme', state.theme);
        };
    </script>
</body>
</html>
